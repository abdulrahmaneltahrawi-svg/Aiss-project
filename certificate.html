<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/logo.png" />
    <title>الشهادات-المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet">
</head>
<body>
    <header>
      <img src="imge/لوجو الهيدر.png" alt="logo" />

      <div class="search-img"><img src="imge/loupe.png" alt="search" /></div>

      <div class="shop-img">
        <img src="imge/shopping-cart.png" alt="search" />
      </div>

      <!--زر تسجيل الدخول-->

      <button class="btn-cont" id="openModel">
        <img src="imge/profile.png" alt="btn-logo" />
        <span>تسجيل/ دخول</span>
      </button>

      <div class="model-overlay" id="loginModel">
        <div class="model-box">
          <span class="close-btn" id="closeModel">&times;</span>
          <h3>سجل الدخول أو أنشئ حساب</h3>

          <div class="social-buttons">
            <button class="social-obt google">
              المتابة باستخدام Google <img src="icons/google.png" />
            </button>
            <button class="social-obt Apple">
              المتابعة بستخدام Apple <img src="icons/apple-logo.png" />
            </button>
            <button class="social-obt Facebook">
              المتابعة بستخدام Facebook <img src="icons/facebooks.png" />
            </button>
          </div>

          <div class="divider">أو</div>

          <input
            type="email"
            class="email-input"
            placeholder="البريد الالكتروني"
          />
          <button class="submit-btn">متابعة</button>

          <p class="policy-text">
            تتم معالجة بياناتك الشخصية وفقا لسياسة الخصوصية
          </p>
        </div>
      </div>

      <!--الرئيسية-->

      <ul>
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="magazine.html">المجلات</a></li>
        <li><a href="#">المدونات</a></li>
        <li><a href="#">كتيبات السلامة</a></li>
        <li><a href="#">الاكواد و المعايير</a></li>
        <li><a href="#">الأحداث</a></li>
        <li><a href="#">المتجر</a></li>
      </ul>
    </header>
    <!--قسم صفحة الشهادات-->
    <div class="search-class">
      <input class="search-input" type="text" placeholder="بحث">
<button class="search-btn">بحث</button>

    </div>


<script src="script.js"></script>
</body>
</html>
