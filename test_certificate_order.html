<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Test Certificate Order</title>
</head>
<body>

  <h2>اختبار طلب شهادة</h2>

  <input type="text" id="first_name" placeholder="الاسم الأول"><br><br>
  <input type="text" id="last_name" placeholder="اسم العائلة"><br><br>
  <input type="text" id="company_name" placeholder="اسم الشركة"><br><br>
  <input type="text" id="country" placeholder="الدولة"><br><br>
  <input type="text" id="phone" placeholder="رقم الهاتف"><br><br>
  <input type="email" id="email" placeholder="البريد الإلكتروني"><br><br>

  <select id="certificate_type">
    <option value="1">شهادة مدرب معتمد - 735</option>
    <option value="2">شهادة مركز معتمد - 1469</option>
  </select><br><br>

  <textarea id="notes" placeholder="ملاحظات"></textarea><br><br>

  <button onclick="sendOrder()">إنشاء الطلب</button>

  <pre id="result"></pre>

  <script>
    function sendOrder() {
      const formData = new FormData();

      formData.append("first_name", document.getElementById("first_name").value.trim());
      formData.append("last_name", document.getElementById("last_name").value.trim());
      formData.append("company_name", document.getElementById("company_name").value.trim());
      formData.append("country", document.getElementById("country").value.trim());
      formData.append("phone", document.getElementById("phone").value.trim());
      formData.append("email", document.getElementById("email").value.trim());
      formData.append("notes", document.getElementById("notes").value.trim());
      formData.append("certificate_type", document.getElementById("certificate_type").value);

      fetch("api/create_certificate_order.php", {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById("result").textContent = "Error: " + err;
      });
    }
  </script>

</body>
</html>
