<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شركاء المعهد العربي لعلوم السلامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --bg-color: #f4f7f6;
            --map-fill: #e0e0e0;
            --map-hover: #3498db;
            --map-active: #1a5276;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }



        /* حاوية الخريطة */
        .map-section {
            max-width: 1000px;
            margin: 20px auto;
            margin-top: 150px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .map-svg { width: 100%; height: auto; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1)); }

        /* استايل الدول الجغرافي */
        .st0 { fill: var(--map-fill); stroke: #ffffff; stroke-width: 0.7; cursor: pointer; transition: 0.3s; }
        .st0:hover { fill: var(--map-hover); transform: translateY(-2px); }
        .active-country { fill: var(--map-active) !important; stroke: #fff; stroke-width: 1.5; }

        .controls { text-align: center; margin-top: 15px; }
        .btn-all { padding: 10px 25px; background: var(--accent-color); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* شبكة البطاقات */
        .partners-grid {
            max-width: 1200px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card { background: white; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; transition: 0.4s; display: flex; flex-direction: column; }
        .card.hidden { display: none; }
        
        .logo-box { height: 160px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 15px; border-bottom: 1px solid #eee; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info { padding: 15px; }
        .tag { background: #e1f5fe; color: #0288d1; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        h3 { font-size: 16px; margin: 10px 0 5px 0; color: var(--primary-color); }
        p { font-size: 13px; color: #666; margin: 0; line-height: 1.4; }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="map-section">
    <svg class="map-svg" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
        <path id="MA" class="st0" d="M100,180 L180,180 L170,230 L90,230 Z" onclick="filterCards('morocco', 'MA')"><title>المغرب</title></path>
        <path id="TN" class="st0" d="M280,150 L310,150 L310,180 L280,180 Z" onclick="filterCards('tunisia', 'TN')"><title>تونس</title></path>
        <path id="DZ" class="st0" d="M190,180 L270,180 L270,260 L190,260 Z" onclick="filterCards('algeria', 'DZ')"><title>الجزائر</title></path>
        <path id="LY" class="st0" d="M320,180 L420,180 L420,270 L320,270 Z" onclick="filterCards('libya', 'LY')"><title>ليبيا</title></path>
        <path id="EG" class="st0" d="M430,180 L520,180 L520,280 L430,280 Z" onclick="filterCards('egypt', 'EG')"><title>مصر</title></path>
        <path id="SD" class="st0" d="M430,290 L520,290 L520,380 L430,380 Z" onclick="filterCards('sudan', 'SD')"><title>السودان</title></path>
        <path id="PS" class="st0" d="M530,150 L540,150 L540,175 L530,175 Z"  onclick="filterCards('palestine', 'PS')"><title>فلسطين</title></path>
        <path id="JO" class="st0" d="M545,160 L570,160 L570,185 L545,185 Z" onclick="filterCards('jordan', 'JO')"><title>الأردن</title></path>
        <path id="SA" class="st0" d="M550,200 L680,200 L700,320 L580,350 Z" onclick="filterCards('saudi', 'SA')"><title>السعودية</title></path>
        <path id="IQ" class="st0" d="M580,140 L650,140 L650,190 L580,190 Z" onclick="filterCards('iraq', 'IQ')"><title>العراق</title></path>
        <path id="YE" class="st0" d="M600,360 L700,360 L720,410 L600,410 Z" onclick="filterCards('yemen', 'YE')"><title>اليمن</title></path>
        <path id="OM" class="st0" d="M710,300 L780,300 L800,380 L710,380 Z" onclick="filterCards('oman', 'OM')"><title>سلطنة عُمان</title></path>
        <path id="KW" class="st0" d="M660,180 L680,180 L680,195 L660,195 Z" onclick="filterCards('kuwait', 'KW')"><title>الكويت</title></path>
    </svg>
    <div class="controls">
        <button class="btn-all" onclick="filterCards('all', '')">إظهار كافة الدول والشركاء</button>
    </div>
</div>

<div class="partners-grid" id="grid">
    </div>

    <div id="footer-placeholder"></div>

        {name: "مركز جارتير", country: "oman", countryAr: "عُمان", img: "Picture28.jpg", desc: "تنمية المهارات القيادية والمهنية."},
        {name: "مجتمع مواهب HSE", country: "saudi", countryAr: "السعودية", img: "Picture29.jpg", desc: "تبادل الخبرات في قطاع السلامة والبيئة."},
        {name: "الجمعية التونسية لمفتقدي الشغل", country: "tunisia", countryAr: "تونس", img: "Picture30.jpg", desc: "الدفاع عن حقوق العاطلين وإعادة التأهيل."},
        {name: "البورد الأوروبي", country: "palestine", countryAr: "فلسطين", img: "Picture31.jpg", desc: "إعداد القادة ونقل الخبرات الدولية."},
        {name: "الجمعية العربية لخبراء الإدارة", country: "palestine", countryAr: "فلسطين", img: "Picture32.jpg", desc: "تطوير الأنظمة الإدارية ونشر الفكر الحديث."}
    ];

    const grid = document.getElementById('grid');

    // إنشاء البطاقات عند التحميل
    function init() {
        partners.forEach(p => {
            const card = document.createElement('div');
            card.className = `card ${p.country}`;
            card.innerHTML = `
                <div class="logo-box"><img src="assets/logos/${p.img}" alt="${p.name}"></div>
                <div class="info">
                    <span class="tag">${p.countryAr}</span>
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterCards(country, pathId) {
        // تحديث ألوان الخريطة
        document.querySelectorAll('.st0').forEach(path => path.classList.remove('active-country'));
        if(pathId) document.getElementById(pathId).classList.add('active-country');

        // فلترة البطاقات
        document.querySelectorAll('.card').forEach(card => {
            if (country === 'all' || card.classList.contains(country)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }

    init();
</script>

<script src="js/script.js"></script>

</body>
</html>
