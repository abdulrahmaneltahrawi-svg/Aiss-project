<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>التحقق من الشهادات - المعهد العربي لعلوم السلامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f7f6;
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            color: #333;
            margin-top:300px ;
        }
        h2 {
            color: #235287;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 16px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #235287;
        }
        button {
            background: #e4293a;
            
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }   
        #result {
            margin-top: 24px;
            display: none;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .success-card {
            border-right: 5px solid #198754;
            background: #f8fff9;
        }
        .error-card {
            border-right: 5px solid #e4293a;
            background: #fff8f8;
        }
        .card h3 {
            margin: 0 0 14px;
            font-size: 18px;
            font-weight: 700;
        }
        .success-card h3 {
            color: #198754;
        }
        .error-card h3 {
            color: #e4293a;
        }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .label {
            color: #6b7280;
        }
        .value {
            font-weight: bold;
            color: #235287;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .expired {
            background: #fde68a;
            color: #92400e;
        }

        .pdf-btn {
            display: block;
            margin-top: 14px;
            background: #235287;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .pdf-btn:hover {
            background: #1a3c63;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <h2>التحقق من شهادة</h2>

    <label>كود الشهادة</label>
    <input type="text" id="code" placeholder="AISSFC25070050">

    <button onclick="verify()">تحقق</button>

    <div id="result"></div>
    

    <script src="js/script.js"></script>

    <script>
        async function verify() {
            const code = document.getElementById("code").value.trim();
            const resultDiv = document.getElementById("result");

            if (!code) {
                resultDiv.style.display = "block";
                resultDiv.innerHTML = '<div class="card error-card"><h3>⚠️ يرجى إدخال كود الشهادة</h3></div>';
                return;
            }

            resultDiv.style.display = "block";
            resultDiv.innerHTML = '<p style="text-align:center;color:#6b7280">جاري التحقق...</p>';

            try {
                const base = window.location.pathname.replace(/\/[^\/]*$/, '').replace(/\/api$/, '');
                const res = await fetch(base + `/api/verify.php?code=${encodeURIComponent(code)}`, {
                    // const res = await fetch(`http://localhost/aiss/api/verify.php?code=${encodeURIComponent(code)}`, {
                    credentials: "include"
                });
                const data = await res.json();

                if (!data.success) {
                    resultDiv.innerHTML = `<div class="card error-card"><h3>❌ ${data.message}</h3></div>`;
                    return;
                }

                const badgeClass = data.status === "active" ? "active" : data.status === "expired" ? "expired" : "revoked";
                const icon = data.valid ? "✅" : "❌";

                resultDiv.innerHTML = `
                    <div class="card success-card">
                        <h3>${icon} ${data.valid ? "شهادة معتمدة" : "الشهادة غير سارية"}</h3>
                        <div class="row">
                            <span class="label">نوع الشهادة</span>
                            <span class="value">${data.type}</span>
                        </div>
                        <div class="row">
                            <span class="label">الاسم</span>
                            <span class="value">${data.holder_name}</span>
                        </div>
                        <div class="row">
                            <span class="label">كود الشهادة</span>
                            <span class="value">${data.code}</span>
                        </div>
                        <div class="row">
                            <span class="label">تاريخ الإصدار</span>
                            <span class="value">${data.issue_date}</span>
                        </div>
                        <div class="row">
                            <span class="label">تاريخ الانتهاء</span>
                            <span class="value">${data.expiry_date ?? "غير محدد"}</span>
                        </div>
                        <div class="row">
                            <span class="label">الحالة</span>
                            <span class="value"><span class="badge ${badgeClass}">${data.status_label}</span></span>
                        </div>
                        <a class="pdf-btn" href="${data.file_url}" target="_blank">📄 عرض الشهادة PDF</a>
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="card error-card"><h3>خطأ: ${err.message}</h3></div>`;
            }
        }

        // إرسال بالضغط على Enter
        document.getElementById("code").addEventListener("keypress", function (e) {
            if (e.key === "Enter") verify();
        });
    </script>
    
</body>

</html>
