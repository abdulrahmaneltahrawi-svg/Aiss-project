<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>الاكواد و المعايير-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

   
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header-placeholder"></div>
   <!--قسم صفحة العرض-->


    <div class="hero-section-m">
      <img src="assets/imge/0006.jpg" alt="" loading="lazy"/>
      <div class="logo-text"><p>الأكواد والمعايير</p></div>
    </div>

    <!--قسم الكروت-->
    <div class="title0">
      <p>الأكواد والمعايير</p>  

    </div>

    <div id="codes-grid" class="card-container1"></div>

<script>
async function fetchCodesData() {
  // نحاول أكثر من مسار لتفادي مشاكل الأسماء/الترميز أثناء النشر
  const paths = [
    "cleaned-posts (1).json",
    "cleaned-posts%20(1).json",
    "./cleaned-posts (1).json",
    "./cleaned-posts%20(1).json",
  ];

  for (const path of paths) {
    try {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) continue;
      const data = await response.json();
      if (Array.isArray(data) && data.length) return data;
    } catch (_) {}
  }

  throw new Error("تعذّر تحميل ملف الأكواد والمعايير");
}

function renderCodes(data) {
  const grid = document.getElementById("codes-grid");
  if (!grid) return;
  grid.innerHTML = "";

  data.forEach((item, index) => {
    const img = item.image || "assets/imge/0006.jpg";
    grid.innerHTML += `
      <div class="card1">
        <img src="${img}" alt="${item.title || "كود"}">
        <div class="class-content1">
          <h3>${item.title || ""}</h3>
          <a href="views.html?id=${index}&source=codes" class="btn1">عرض التفاصيل</a>
        </div>
      </div>
    `;
  });
}

async function loadCodes() {
  const grid = document.getElementById("codes-grid");
  if (!grid) return;
  try {
    const data = await fetchCodesData();
    renderCodes(data);
  } catch (error) {
    console.error("خطأ في جلب البيانات:", error);
    grid.innerHTML = `<p style="padding:16px;text-align:center;">تعذر تحميل الأكواد والمعايير حاليًا.</p>`;
  }
}

document.addEventListener("DOMContentLoaded", loadCodes);
</script>
    



     <!-- القسم الاخير-->

   <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  </body>
</html>
