<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>الاكواد و المعايير-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

   
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
          <style>
      .logo-text{
        position: absolute;
        left: 50%;
        transform: translate(-50%,-65%);
        color: red;
        font-weight: bold;
        font-size: 70px;
      }
    </style>
    
  <body>
    <div id="header-placeholder"></div>
   <!--قسم صفحة العرض-->


    <div class="hero-section-m">
      <img src="assets/imge/0004.jpg" alt="" loading="lazy"/>
      <div class="logo-text"><p>الأكواد والمعايير</p></div>
    </div>

    <!--قسم الكروت-->
    <div class="magazine-1">
      <p>الأكواد والمعايير</p>  

    </div>

    <div id="codes-grid" class="card-container1"></div>

<script>
async function loadCodes() {
    const grid = document.getElementById("codes-grid");
    if (!grid) return;

    try {
        const response = await fetch('cleaned-posts (1).json');
        const data = await response.json();

        grid.innerHTML = ""; // تنظيف الحاوية قبل الإضافة

        data.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card1">
                    <img src="${item.image}">
                    <div class="class-content1">
                        <h3>${item.title}</h3>
                        <a href="views.html?id=${index}&source=codes" class="btn1">عرض التفاصيل</a>
                    </div>
                </div>
            `;
        });
    } catch (error) {
        console.error("خطأ في جلب البيانات:", error);
    }
}
document.addEventListener('DOMContentLoaded', loadCodes);
</script>
    



     <!-- القسم الاخير-->

   <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  </body>
</html>
