<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.webp" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>الأحداث-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <style>
      /* Container Settings */
      /* مخفي تماماً في الحالة العادية */
      .competition-section {
        display: none;
      }

      /* يظهر فقط عندما نضيف هذا الكلاس */
      .competition-section.active {
        display: block;
        
      }

/* Intro Card */
.comp-intro-card {
  text-align: center;
  background: #ffffff;
  /* تقليل البادينج من الأعلى والأسفل */
  padding: 20px 40px; 
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
  margin-bottom: 30px;
  border-top: 5px solid #e4293a;
  
  /* تحديد عرض أقصى وتوسيط الكارد لمنعه من التمدد العرضي الطويل */
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  margin-top: 50px;

  
}

      .comp-main-title {
        color: #235287; /* لون المعهد الكحلي */
        font-size: 2.2rem;
        margin-bottom: 20px;
      }

      .comp-text-highlight {
        font-size: 1.15rem;
        line-height: 1.8;
        color: #636e72;
        max-width: 900px;
        margin: 0 auto;
      }

/* Details Grid */
.comp-details-grid {
  display: grid;
  /* تغيير 200px إلى 300px لضمان عدم صغر الكاردات بشكل يسبب التصاق النص */
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  /* أهم خطوة: تحديد عرض أقصى للشبكة وتوسيطها مثل الكارد العلوي */
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px; /* مسافة أمان جانبية للشاشات الصغيرة */
}

      .comp-card {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        border: 1px solid #f1f2f6;
        transition: all 0.3s ease;
        
      }

      .comp-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }

      .card-icon {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .comp-card h3 {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      .goals-card h3 {
        color: #e4293a;
      }
      .awards-card {
        background-color: #235287;
        color: #fff;
      }
      .awards-card h3 {
        color: #d4af37;
      } /* لون ذهبي للجوائز */

      .comp-card p {
        font-size: 1rem;
        line-height: 1.7;
        text-align: justify;
      }

      /* Responsive Adjustments */
      @media (max-width: 768px) {
        .comp-main-title {
          font-size: 1.8rem;
        }
        .comp-details-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <div id="header-placeholder"></div>
    
    <!--قسم صفحة العرض-->
    <div class="hero-section-m">
      <img src="assets/imge/0006.jpg" alt="hero-logo" loading="lazy" />
      <div class="logo-text"><p>فعاليات</p></div>
    </div>

    <!-- شريط الأحداث المتحرك -->
    <div class="latest-events-ticker">
      <div class="ticker-label">آخر الأحداث</div>
      <div class="ticker-container">
        <div id="ticker-content" class="ticker-content"></div>
      </div>
    </div>

    <!--قسم الكروت-->
    <div class="title0">
      <p>الفعاليات</p>
    </div>



    <div id="events-grid" class="card-container1"></div>

    <div class="load-more-btn-container">
      <button id="load-more-events" class="btn1" style="display: none;">عرض المزيد</button>
    </div>

    <script src="js/events.js"></script>

    <script>
      const Egrid = document.getElementById("events-grid");
      const loadMoreBtn = document.getElementById("load-more-events");
      const pageTitle = document.getElementById("page-category-title");
      
      const ALL_EVENTS = typeof events !== "undefined" ? events : [];
      let filteredEvents = [];
      let displayedEventsCount = 0;
      const eventsPerPage = 8;
      const PAGE_NAME = "event.html";

function getCategoryFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('cat'); // سيجلب "مؤتمر السلامة العربي الخامس" مثلاً
}

      // --- الدالة المسؤولة عن إظهار/إخفاء قسم نبذة المسابقة ---
      function handleCompetitionVisibility(category) {
        const compSection = document.getElementById('arabic-competition-section');
        if (!compSection) return;

        if (category === 'مسابقة') {
            compSection.classList.add('active'); // إظهار النص
        } else {
            compSection.classList.remove('active'); // إخفاء النص في أي قسم آخر
        }
      }

      function createCardHTML(item) {
        const slug = item.title.trim().replace(/[^\u0600-\u06FFa-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        return `
          <div class="card1" data-aos="fade-up">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
            <div class="class-content1">
              <h3>${item.title}</h3>
              <a href="views.html?id=${slug}&source=events" class="btn1">عرض التفاصيل</a>
            </div>
          </div>
        `;
      }

      function renderNextEvents() {
        const nextChunk = filteredEvents.slice(displayedEventsCount, displayedEventsCount + eventsPerPage);
        const html = nextChunk.map(item => createCardHTML(item)).join("");
        Egrid.insertAdjacentHTML('beforeend', html);
        
        displayedEventsCount += nextChunk.length;
        if (loadMoreBtn) loadMoreBtn.style.display = (displayedEventsCount < filteredEvents.length) ? "inline-block" : "none";
        
        if (typeof AOS !== "undefined") AOS.refresh();
      }

function initEvents() {
    if (!Egrid) return;

    let selectedCat = getCategoryFromURL(); 
    if (selectedCat) {
        selectedCat = decodeURIComponent(selectedCat).replace(/["“”'‘’]/g, '').trim();
    }

    // 1. الفلترة الأساسية: عرض المؤتمرات فقط واستبعاد أي مسابقات
    let conferencesOnly = ALL_EVENTS.filter(ev => ev.category === "مؤتمرات");

    if (selectedCat && selectedCat !== "مؤتمرات") {
        // 2. إذا تم اختيار مؤتمر محدد (الأول، الثاني...) من القائمة
        filteredEvents = conferencesOnly.filter(ev => {
            const cleanTitle = ev.title.replace(/["“”'‘’]/g, '').trim();
            // البحث عن تطابق أو احتواء النص (لحل مشكلة المؤتمر الأول)
            return cleanTitle.includes(selectedCat) || selectedCat.includes(cleanTitle);
        });

        // تحديث العنوان ليظهر اسم المؤتمر المختار
        const titlePara = document.querySelector(".title0 p");
        if (titlePara) titlePara.innerText = selectedCat;
    } else {
        // 3. الحالة الافتراضية: عرض كل المؤتمرات المتاحة
        filteredEvents = conferencesOnly;
        const titlePara = document.querySelector(".title0 p");
        if (titlePara) titlePara.innerText = "مؤتمرات السلامة العربية";
    }

    // 4. منطق العرض (Rendering)
    if (filteredEvents.length === 0) {
        Egrid.innerHTML = `<p style="text-align:center; padding:20px; width:100%;">لا توجد بيانات متاحة حالياً لـ "${selectedCat || 'المؤتمرات'}".</p>`;
        if (loadMoreBtn) loadMoreBtn.style.display = "none";
        return;
    }

    // عرض الكروت
    Egrid.innerHTML = filteredEvents.map(item => createCardHTML(item)).join("");
    
    // إدارة زر "عرض المزيد"
    if (loadMoreBtn) {
        loadMoreBtn.style.display = (filteredEvents.length > eventsPerPage) ? "inline-block" : "none";
        displayedEventsCount = Math.min(filteredEvents.length, eventsPerPage);
    }

    if (typeof AOS !== "undefined") AOS.refresh();
}
      function initTicker() {
        const tickerContent = document.getElementById("ticker-content");
        if (!tickerContent || !ALL_EVENTS.length) return;

        const latest = ALL_EVENTS.slice(0, 5);
        const tickerHTML = latest.map(item => {
          const slug = item.title.trim().replace(/[^\u0600-\u06FFa-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
          return `<a href="views.html?id=${slug}&source=events" class="ticker-event">${item.title}</a>`;
        }).join("");

        tickerContent.innerHTML = tickerHTML + tickerHTML;
      }

      document.addEventListener("DOMContentLoaded", () => {
          initTicker();
          initEvents();
      });

      loadMoreBtn?.addEventListener("click", renderNextEvents);
    </script>

    <div id="footer-placeholder"></div>
    <script src="js/script.js" defer></script>
    <script src="js/auth-toggle.js" defer></script>
  </body>
</html>
