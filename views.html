<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تفاصيل الكرت-المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <!--تعريف للخط-->
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"

    <!--css الكود-->

    <style>
      .container0 {
        width: 90%;
        height: 20%;
        margin: auto;
        background-color: whitesmoke;
        padding: 30px;
      }

      #title-placeholder {
        color: #e4293a;
        text-align: center;
        margin-top: 80px;
        padding: 20px;
      }

      #image-placeholder {
        display: block;
        margin: auto;
        max-width: 400px;
        
        
      }

      #description-placeholder {
        text-align: right;
        line-height: 1.8;
        margin-top: 20px;
      }

          #description-placeholder img {
    display: none !important;

      }


      .back {
        background: white;
        padding: 15px 20px;
        border-radius: 25px;
        margin-bottom: 16px;
        font-weight: bold;
      }

      .container0 button:hover {
        cursor: pointer;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div class="container0">
      <h1 id="title-placeholder"></h1>
      <img id="image-placeholder" src=""  />
      <p id="description-placeholder"></p>
      <br />
      <a href="blogs.html"
        ><button class="back">العوده للصفحه السابقة</button></a
      >
    </div>

    <script src="js/data.js"></script>
    <script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const source = params.get("source"); // التحقق من مصدر البيانات

async function loadDynamicContent() {
    let data;

    if (source === 'codes') {
        // إذا كان المصدر "codes" نجلب البيانات من ملف الجيسون
        const response = await fetch('cleaned-posts (1).json');
        data = await response.json();
    } else {
        // إذا لم يكن، نستخدم مصفوفة المدونات الموجودة في js/data.js
        data = myCards; 
       
    }
    
    

    const item = data[id];

    if (item) {
        document.getElementById("title-placeholder").innerText = item.title;
        document.getElementById("image-placeholder").src = item.image;
        // عرض المحتوى سواء كان اسمه content أو description
        document.getElementById("description-placeholder").innerHTML = item.content || item.description;
    }
}

loadDynamicContent();
    </script>


   
    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  </body>
