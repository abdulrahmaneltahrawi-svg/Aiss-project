<!doctype html>
<html lang="ar" dir="rtl">
  <head>
        <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/logo.webp" />
    <title>إتمام الطلب</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

  </head>
  <body>
        <style>
      .payment_container {
        max-width: 600px;
        margin: 150px auto 80px;
        padding: 0 20px;
      }
      .payment-card-box {
        background: #fff;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      .payment-card-box h2 {
        color: #235287;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 800;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
      }
      .form-group input {
        width: 100%;
        padding: 14px;
        border: 1px solid #eee;
        border-radius: 10px;
        background: #fcfcfc;
        font-family: inherit;
        transition: 0.3s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #235287;
        background: #fff;
      }
      .card-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 600px) {
        .payment_container { margin-top: 100px; }
      }
    </style>

    <div id="header-placeholder"></div>

    <div class="payment_container">
                <div class="payment-card-box">
            <h2>تفاصيل الدفع بالبطاقة</h2>
            <form id="card-payment-form" onsubmit="event.preventDefault(); alert('شكراً لك! تم استلام طلبك بنجاح.'); window.location.href='index.html';">
                <div class="form-group">
                    <label>اسم صاحب البطاقة *</label>
                    <input type="text" id="card-name" placeholder="الاسم كما يظهر على البطاقة" required>
                </div>

                <div class="form-group">
                    <label>رقم البطاقة *</label>
                    <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>

                <div class="card-row">
                    <div class="form-group">
                        <label>تاريخ الانتهاء *</label>
                        <input type="text" id="expiry" placeholder="MM / YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>الرمز (CVV) *</label>
                        <input type="password" id="cvv" placeholder="***" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="pay-btn" style="width: 100%; margin-top: 10px; padding: 15px; border-radius: 10px; border: none; background: #e4293a; color: white; font-weight: bold; cursor: pointer; font-size: 17px; transition: 0.3s;">
                    تأكيد الدفع الآمن
                </button>
            </form>
        </div>

    </div>
    
        


    <div id="footer-placeholder"></div>
        <script src="js/script.js"></script>
    <script src="js/auth-toggle.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
