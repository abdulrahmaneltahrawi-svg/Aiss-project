<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>المدونات-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <section class="hero-section-m">
      <img src="imge/0004.jpg" alt="" />
      
      


    </section>

    <!--قسم الكروت-->
    <div class="magazine-1">
      <p>المدونات</p>
    </div>

    <div id="blogs-grid" class="card-container1"></div>

    <script src="js/data.js"></script>
    <script>
      const grid = document.getElementById("blogs-grid");

      myCards.forEach((item) => {
        grid.innerHTML += `
        <div class="card1">
          <img src="${item.image}">
          <div class="class-content1">
            <h3>${item.title}</h3>
            <a href ="views.html?id=${item.id}" class="btn1">عرض التفاصيل</a>
          </div>
        </div>

        `;
      });
      
    </script>

    <!-- القسم الاخير-->

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  </body>
</html>
