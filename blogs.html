<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>المدونات-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>


  <body>
    <div id="header-placeholder"></div>

   <!--قسم صفحة العرض-->

    <div class="hero-section-m">
      <img src="assets/imge/0006.jpg" alt="blogs-pic" loading="lazy"/>
      <div class="logo-text"><p>المدونات</p></div>
    </div>
    

    <div class="blogs-filter">
      <label for="blog-category">التصنيف:</label>
      <select id="blog-category">
        <option value="all">الكل</option>
      </select>
    </div>

    <div id="blogs-grid" class="card-container1"></div>

    <script src="js/data.js"></script>
    <script>
      const grid = document.getElementById("blogs-grid");
      const categorySelect = document.getElementById("blog-category");
      const params = new URLSearchParams(window.location.search);
      const initialCat = params.get("cat");

      function getCategory(item) {
        return item.category || "محتويات علمية";
      }

      function render(items) {
        grid.innerHTML = "";
        items.forEach((item) => {
          grid.innerHTML += `
          <div class="card1">
            <img src="${item.image}">
            <div class="class-content1">
              <h3>${item.title}</h3>
              <a href ="views.html?id=${item.id}" class="btn1">عرض المدونة</a>
            </div>
          </div>
          `;
        });
      }

      function initCategories() {
        if (!categorySelect) return;
        const cats = ["محتويات علمية", "مقالات الخبراء", "مقالات المجلة"];
        cats.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c;
          opt.textContent = c;
          categorySelect.appendChild(opt);
        });
      }

        const val = categorySelect ? categorySelect.value : "all";

        return render(myCards.filter((it) => getCategory(it) === val));
      }

      initCategories();
      if (initialCat && categorySelect) {
        categorySelect.value = initialCat;
      }
      applyFilter();
      if (categorySelect) categorySelect.addEventListener("change", applyFilter);
      
    </script>

    <!-- القسم الاخير-->

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
  </body>
</html>
