<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.webp" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>الأحداث-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header-placeholder"></div>
    <!--قسم صفحة العرض-->

    <div class="hero-section-m">
      <img src="assets/imge/0006.webp" alt="hero-logo" loading="lazy" />
      <div class="logo-text"><p>الأحداث</p></div>
    </div>

    <!--قسم الكروت-->
    <div class="title0">
      <p>الأحداث</p>
    </div>

    <div id="events-grid" class="card-container1"></div>

    <script src="js/events.js"></script>
    <script>
      const Egrid = document.getElementById("events-grid");
      const LOCAL_EVENTS = typeof events !== "undefined" ? events : [];

      function renderEvents(items) {
        if (!Egrid) return;
        Egrid.innerHTML = items.map(item => `
          <div class="card1">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
            <div class="class-content1">
              <h3>${item.title}</h3>
              <a href="views.html?id=${item.id}&source=events" class="btn1">عرض التفاصيل</a>
            </div>
          </div>
        `).join("");
      }

      if (LOCAL_EVENTS.length) {
        renderEvents(LOCAL_EVENTS);
      } else {
        Egrid.innerHTML = '<p style="text-align:center; padding:20px;">لا توجد أحداث متاحة حالياً.</p>';
      }
    </script>

    <!--قسم سياسة الخصوصية-->

    <!-- القسم الاخير-->

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
  </body>
</html>
