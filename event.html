<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="assets/icons/logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>الأحداث-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
          <style>
      .logo-text{
        position: absolute;
        left: 50%;
        transform: translate(-50%,-65%);
        color: red;
        font-weight: bold;
        font-size: 70px;
      }
    </style>
    
  <body>
    <div id="header-placeholder"></div>
   <!--قسم صفحة العرض-->


    <div class="hero-section-m">
      <img src="assets/imge/0004.jpg" alt="" loading="lazy"/>
      <div class="logo-text"><p>الأحداث</p></div>
    </div>

    <!--قسم الكروت-->
    <div class="magazine-1">
      <p>الأحداث</p>
    </div>

    <div id="events-grid" class="card-container1"></div>

    <script src="js/books.js"></script>

    <script>
      const Egrid = document.getElementById("events-grid");

      Mybooks.forEach((item) => {
        Egrid.innerHTML += `
          <div class="card1">
            <img src="${item.image}">
            <div class="class-content1">
              <h3>${item.title}</h3>
              <a href ="views.html?id=${item.id}" class="btn1">عرض التفاصيل</a>
             </div>
           </div>
        
        `;
      });
    </script>

    <script></script>

    <!--قسم سياسة الخصوصية-->

    <!-- القسم الاخير-->

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
  </body>
</html>
