<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إضافة شهادة - المعهد العربي لعلوم السلامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            max-width: 600px; /* Increased max-width */
            margin: 80px auto; /* Adjusted margin for consistency */
            padding: 35px; /* Increased padding for card effect */
            background-color: #fff; /* White background for the card */
            border-radius: 20px; /* Rounded corners for card effect */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Shadow for card effect */
            color: #333; /* Default text color */
        }
        h2 {
            color: #235287; /* AISS Blue */
            text-align: center;
            margin-bottom: 25px; /* Adjusted margin */
            font-weight: 800; /* Bolder font */
        }
        input,
        select {
            width: 100%;
            padding: 12px 15px; /* Increased padding */
            margin: 8px 0 16px; /* Adjusted margin */
            box-sizing: border-box;
            border: 1px solid #ddd; /* Lighter border */
            border-radius: 8px; /* More rounded corners */
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #235287; /* AISS Blue on focus */
        }
        button {
            background: #e4293a; /* AISS Red */
            color: white;
            padding: 14px; /* Increased padding */
            border: none;
            border-radius: 8px; /* More rounded corners */
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold; /* Bolder font */
            transition: background 0.3s;
        }
        button:hover {
            background: #b71c1c; /* Darker AISS Red on hover */
        }
        #result {
            margin-top: 24px; /* Adjusted margin */
            padding: 20px; /* Increased padding */
            border-radius: 12px; /* More rounded corners */
            display: none;
            white-space: pre-wrap;
            font-size: 14px;
            font-weight: 500; /* Added font-weight */
            line-height: 1.6; /* Added line-height */
        }
        .success {
            background: #d1fae5; /* Lighter green */
            border: 1px solid #34d399; /* Green border */
            color: #065f46; /* Darker green text */
        }
        .error {
            background: #fee2e2; /* Lighter red */
            border: 1px solid #f87171; /* Red border */
            color: #991b1b; /* Darker red text */
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #555; /* Darker grey for labels */
            display: block; /* Ensure label takes full width */
            margin-bottom: 5px; /* Spacing below label */
        }
        /* Media query for smaller screens */
        @media (max-width: 600px) {
            body {
                margin-top: 100px; /* Adjust top margin for mobile header */
                padding: 20px; /* Reduce padding on smaller screens */
                border-radius: 15px; /* Slightly less rounded */
            }
        }
    </style>
</head>

<body>
    
    <h2>تست إضافة شهادة</h2>

    <label>كود الشهادة</label>
    <input type="text" id="code" placeholder="AISSFC2510001">

    <label>نوع الشهادة</label>
    <select id="type">
        <option value="خبير معتمد">خبير معتمد</option>
        <option value="مركز معتمد">مركز معتمد</option>
        <option value="برنامج معتمد">برنامج معتمد</option>
    </select>

    <label>اسم الحاصل على الشهادة</label>
    <input type="text" id="holder_name" placeholder="أحمد محمد">

    <label>تاريخ الإصدار</label>
    <input type="date" id="issue_date">

    <label>تاريخ الانتهاء (اختياري)</label>
    <input type="date" id="expiry_date">

    <label>الحالة</label>
    <select id="status">
        <option value="active">سارية</option>
        <option value="expired">منتهية الصلاحية</option>
        <option value="revoked">ملغاة</option>
    </select>

    <label>ملف الشهادة (PDF)</label>
    <input type="file" id="pdf" accept=".pdf">

    <button onclick="submit()">إضافة الشهادة</button>

    <div id="result"></div>

    <script>
        async function submit() {
            const formData = new FormData();
            formData.append("code", document.getElementById("code").value);
            formData.append("type", document.getElementById("type").value);
            formData.append("holder_name", document.getElementById("holder_name").value);
            formData.append("issue_date", document.getElementById("issue_date").value);
            formData.append("expiry_date", document.getElementById("expiry_date").value);
            formData.append("status", document.getElementById("status").value);

            const pdfFile = document.getElementById("pdf").files[0];
            if (pdfFile) formData.append("pdf", pdfFile);

            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "none";

            try {
                // ← غيّر الرابط ده لرابط السيرفر بتاعك
                const base = window.location.pathname.replace(/\/[^\/]*$/, '').replace(/\/api$/, '');
                const res = await fetch(base + "/api/add_certificate.php", {
                    // const res = await fetch(window.location.origin + "/api/add_certificate.php", {

                    method: "POST",
                    credentials: "include",
                    body: formData
                });
                const data = await res.json();

                resultDiv.style.display = "block";
                resultDiv.className = data.success ? "success" : "error";
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                resultDiv.style.display = "block";
                resultDiv.className = "error";
                resultDiv.textContent = "خطأ: " + err.message;
            }
        }
    </script>
</body>

</html>
