<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/logo.png" />
    <title>صفحة - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <main class="page-content">
      <div class="container0">
        <h1 id="page-title"></h1>
        <div id="page-body"></div>
        <br />
        <a href="index.html"><button class="back">العودة للرئيسية</button></a>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/pages.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const key = params.get("key") || "news";
      const entry = pages[key];

      const titleEl = document.getElementById("page-title");
      const bodyEl = document.getElementById("page-body");

      if (!entry) {
        document.title = "غير موجود";
        if (titleEl) titleEl.innerText = "الصفحة غير موجودة";
        if (bodyEl) bodyEl.innerHTML = "<p>الرابط غير صحيح أو الصفحة غير متوفرة.</p>";
      } else {
        document.title = `${entry.title} - المعهد العربي لعلوم السلامة`;
        if (titleEl) titleEl.innerText = entry.title;
        if (bodyEl) bodyEl.innerHTML = entry.html;
      }
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
