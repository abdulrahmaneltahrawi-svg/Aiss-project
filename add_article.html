<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مقال - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
    <style>
        .editor-wrapper {
            max-width: 1200px;
            margin: 140px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }
        .db-sidebar {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .db-sidebar ul { list-style: none; padding: 0; }
        .db-sidebar li { margin-bottom: 10px; }
        .db-sidebar a { 
            display: block; padding: 12px 15px; border-radius: 10px; 
            color: #444; font-weight: bold; transition: 0.3s;
        }
        .db-sidebar a:hover, .db-sidebar a.active { background: #f0f4f8; color: #e4293a; }

        .form-box { 
            background: #fff; padding: 30px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #235287; }
        .form-group input[type="text"], .form-group input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;
        }
        .save-btn {
            background: #e4293a; color: #fff; border: none; padding: 12px 30px; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .save-btn:hover { background: #b71c1c; }

        @media (max-width: 768px) {
            .editor-wrapper { grid-template-columns: 1fr; margin-top: 100px; }
            .db-sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="editor-wrapper">
        <aside class="db-sidebar">
            <h3 style="color: #235287; margin-bottom: 20px;">القائمة</h3>
            <ul>
                <li><a href="dashboard.html">الرئيسية</a></li>
                <li><a href="#" class="active">إضافة مقال</a></li>
                <li><a href="blogs.html">المدونات</a></li>
                <li><a href="index.html">العودة للموقع</a></li>
            </ul>
        </aside>

        <main class="form-box">
            <h2 style="color: #235287; margin-bottom: 25px;">كتابة مقال جديد</h2>
            <div class="form-group">
                <label>عنوان المقال:</label>
                <input type="text" id="title" placeholder="أدخل عنوان المقال هنا...">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>صورة الواجهة (الغلاف):</label>
                    <input type="file" id="cover_image" accept=".jpg,.jpeg,.png,.webp">
                </div>
                <div class="form-group">
                    <label>الصورة الداخلية:</label>
                    <input type="file" id="inner_image" accept=".jpg,.jpeg,.png,.webp">
                </div>
            </div>
            <div class="form-group">
                <label>محتوى المقال:</label>
                <textarea id="content"></textarea>
            </div>
            <button class="save-btn" onclick="saveArticle()">حفظ ونشر المقال</button>
        </main>
    </div>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
    <script>
        tinymce.init({
            selector: '#content', height: 400, menubar: false,
            plugins: 'lists link code directionality',
            toolbar: 'undo redo | blocks | bold italic underline | forecolor | bullist numlist | alignright aligncenter alignleft | rtl ltr | code',
            directionality: 'rtl',
            content_style: `body { direction: rtl; text-align: right; font-family: Tajawal, Arial, sans-serif; } p, h1, h2, h3, h4, h5, h6, ul, ol, li { direction: rtl; text-align: right; }`
        });

        function saveArticle() {
            const title = document.getElementById("title").value;
            const content = tinymce.get("content").getContent();
            const coverImage = document.getElementById("cover_image").files[0];
            const innerImage = document.getElementById("inner_image").files[0];
            const formData = new FormData();
            formData.append("title", title); formData.append("content", content);
            formData.append("cover_image", coverImage); formData.append("inner_image", innerImage);
            fetch("api/add_user_article.php", { method: "POST", body: formData, credentials: "same-origin" })
            .then(res => res.json()).then(data => { alert(data.message); if(data.success) window.location.href="dashboard.html"; })
            .catch(err => { console.error(err); alert("حصل خطأ في الاتصال"); });
        }
        window.addEventListener('load', () => {
            fetch('api/check_user_auth.php').then(r => r.json()).then(data => {
                if(!data.authenticated) window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
