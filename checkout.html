<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/icons/logo.webp" />
  <title>إتمام الطلب</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="aiss-checkout-wrapper"></div>

  <div id="header-placeholder"></div>

  <div class="checkout-container">
    <div class="billing-details">
      <h3 class="section-title">تفاصيل الفاتورة</h3>
      <form>
        <div class="input-group">
          <div class="field">
            <label>اسم العائلة *</label>
            <input type="text" id="last-name" name="last-name" required />
          </div>
          <div class="field">
            <label>الاسم الأول *</label>
            <input type="text" id="first-name" name="first-name" required />
          </div>
        </div>

        <div class="field">
          <label>اسم الشركة (اختياري)</label>
          <input type="text" />
        </div>

        <select id="country">
          <option value="">اختر الدولة</option>
          <option value="Saudi Arabia">المملكة العربية السعودية</option>
          <option value="UAE">الإمارات العربية المتحدة</option>
        </select>

        <div class="field">
          <label>الجوال *</label>
          <input type="tel" id="phone" name="phone" required autocomplete="tel" />
        </div>

        <div class="field">
          <label>البريد الإلكتروني *</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <h3 class="section-title">معلومات إضافية</h3>
        <div class="field">
          <label>ملاحظات الطلب (اختياري)</label>
          <textarea placeholder="ملاحظات حول الطلب، مثال: ملحوظة خاصة بتسليم الطلب."></textarea>
        </div>
      </form>
    </div>

    <div class="order-sidebar">
      <div class="order-card">
        <h3 class="order-title">طلبك</h3>
        <table class="order-table">
          <thead>
            <tr>
              <th>المجموع</th>
              <th>المنتج</th>
            </tr>
          </thead>
          <tbody id="order-items"></tbody>
        </table>

        <p class="terms-text">
          سيتم استخدام بياناتك الشخصية لدعم تجربتك عبر هذا الموقع، ولإدارة
          الوصول إلى حسابك، ولأغراض أخرى موضحة في
          <a href="AgreementPrivacy.html">سياسة الخصوصية</a>.
        </p>

        <button class="pay-btn" id="pay-btn" type="button">
          تأكيد وإتمام الطلب
        </button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // --- 1. عرض إجمالي الطلب المستلم من صفحة السلة ---
      const savedTotal = localStorage.getItem("orderTotal") || 0;
      const orderItemsContainer = document.getElementById("order-items");

      // لنفترض أنك تريد عرض السعر الإجمالي في آخر صف في الجدول
      if (orderItemsContainer) {
        orderItemsContainer.innerHTML = `
                <tr>
                    <td style="font-weight: bold; color: #e4293a;">${savedTotal} د.ا</td>
                    <td style="font-weight: bold;">الإجمالي النهائي</td>
                </tr>
            `;
      }

      // --- 2. التحقق من الحقول قبل الانتقال ---
      const payBtn = document.getElementById("pay-btn");
      if (payBtn) {
        payBtn.addEventListener("click", function () {
          // جلب الحقول
          const firstName = document.getElementById("first-name");
          const lastName = document.getElementById("last-name");
          const phone = document.getElementById("phone");
          const email = document.getElementById("email");
          const country = document.getElementById("country");
          // فحص الفراغات
          if (!firstName.value.trim() || !lastName.value.trim() || !phone.value.trim() || !email.value.trim()) {
            alert("يرجى ملء جميع الحقول الإلزامية التي تحمل علامة (*)");

            // تلوين الحقول الفارغة للتنبيه
            [firstName, lastName, phone, email].forEach(field => {
              field.style.border = field.value.trim() ? "1px solid #ccc" : "2px solid red";
            });
            return;
          }

          // فحص صحة الإيميل
          if (!email.value.includes("@")) {
            alert("البريد الإلكتروني غير صحيح");
            email.style.border = "2px solid red";
            return;
          }

          // إذا كل شيء تمام -> انتقل لصفحة الدفع
          // window.location.href = "checkout_payment.html";

          payBtn.addEventListener("click", async function () {

            const firstName = document.getElementById("first-name");
            const lastName = document.getElementById("last-name");
            const phone = document.getElementById("phone");
            const email = document.getElementById("email");

            if (!firstName.value.trim() || !lastName.value.trim() || !phone.value.trim() || !email.value.trim()) {
              alert("يرجى ملء جميع الحقول الإلزامية");
              return;
            }

            if (!country.value || country.value === "") {
              alert("يرجى اختيار الدولة");
              return;
            }

            if (!email.value.includes("@")) {
              alert("البريد الإلكتروني غير صحيح");
              return;
            }

            try {

              // 🧠 نجيب نوع الشهادة من localStorage
              const certificateType = localStorage.getItem("certificateType");
              const total = localStorage.getItem("orderTotal");

              const formData = new FormData();
              formData.append("first_name", firstName.value);
              formData.append("last_name", lastName.value);
              formData.append("phone", phone.value);
              formData.append("email", email.value);
              formData.append("certificate_type", certificateType);
              formData.append("amount", total);
              formData.append("country", country.value);

              // 1️⃣ إنشاء الطلب
              const res1 = await fetch("api/create_certificate_order.php", {
                method: "POST",
                body: formData
              });

              const data1 = await res1.json();

              if (!data1.success) {
                alert(data1.message || "فشل إنشاء الطلب");
                return;
              }

              const orderId = data1.order_id;

              // 2️⃣ إنشاء Stripe Checkout
              const formData2 = new FormData();
              formData2.append("order_id", orderId);

              const res2 = await fetch("api/create_stripe_checkout.php", {
                method: "POST",
                body: formData2
              });

              const data2 = await res2.json();

              if (data2.success && data2.checkout_url) {
                window.location.href = data2.checkout_url;
              } else {
                alert("فشل في إنشاء صفحة الدفع");
              }

            } catch (error) {
              console.error(error);
              alert("حدث خطأ أثناء الدفع");
            }

          });
        });
      }
    });
  </script>


  <script src="js/script.js"></script>
  <script src="js/auth-toggle.js"></script>

</body>

</html>
