<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icons/logo.png" />
    <title>المتجر-المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <!--تعريف للخط-->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
</head>
<body>

  
  <div id="cart-popup" class="cart-popup hidden">
    <div class="popup-content">
        <span class="close-popup" onclick="closeCartPopup()">&times;</span>
        <div class="product-info">
            <img id="popup-img" src="" alt="">
            <div>
                <h4 id="popup-title"></h4>
                <p id="popup-price"></p>
            </div>
        </div>
        <hr>
        <div class="popup-footer">
    <button class="btn-view-cart" onclick="window.location.href='view-cart.html'">عرض السلة</button>
    
    <button class="btn-checkout" onclick="window.location.href='checkout.html'">إتمام الطلب</button>
</div>
    </div>
</div>




  <div id="header-placeholder"></div>

  <div class="magazine-1">
      <p>المتجر </p>  

    </div>

  <div id="store-grid" class="card-container1"></div>

  <script>
    //المتجر
    const store = [
    { title: "شهادة مدرب معتمد", date: "735 د.إ", img: "assets/store&memberships/0011.jpg", link: "assets/store&memberships/0011.jpg" },
    { title: " شهادة مركز معتمد", date: " 1,469 د.إ", img: "assets/store&memberships/0012.jpg", link: "assets/store&memberships/0012.jpg" },
];

function createCardHTML(item, btnText = "عرض المجلة") {
    
    const itemData = JSON.stringify(item).replace(/"/g, '&quot;');
    
    return `
    <div class="card1">
        <img src="${item.img}" alt="${item.title}"/>
        <div class="class-content1">
            <h3>${item.title}</h3>
            <p>${item.date}</p>
            <button onclick="addToCart(${itemData})" class="btn1 add-to-cart-btn">${btnText}</button>
        </div>
    </div>`;
}

//المتجر
const myGrid5 = document.getElementById('store-grid');
if (myGrid5) {
    store.forEach(str => { myGrid5.innerHTML += createCardHTML(str, "اضافة الى السلة "); });
}



let cart = JSON.parse(localStorage.getItem('myCart')) || [];

function addToCart(item) {
    let itemData = item;
    if (typeof item === 'string') {
        itemData = JSON.parse(item);
    }

 
    cart.push(itemData);
    localStorage.setItem('myCart', JSON.stringify(cart));

    const cartBadge = document.getElementById('cart-count');
    if (cartBadge) {
        cartBadge.innerText = cart.length;
    }

  
    const popup = document.getElementById('cart-popup');
    if (popup) {
        document.getElementById('popup-title').innerText = itemData.title;
        document.getElementById('popup-img').src = itemData.img;
        document.getElementById('popup-price').innerText = itemData.date;

        popup.classList.remove('hidden');
        setTimeout(() => {
            popup.classList.add('hidden');
        }, 3000);
    }
}

  </script>


   <div id="footer-placeholder"></div>
             

    <script src="js/script.js"></script>
  </body>
</html>
