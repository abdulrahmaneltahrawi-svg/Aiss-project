<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/icons/logo.png" />
    <title>المتجر-المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <!--تعريف للخط-->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
</head>
<body>

  <style>
    .shop-img {
    position: relative; 
    display: inline-block;
}

/* تنسيق الدائرة الحمراء */
.cart-badge {
    position: absolute;
    top: -8px;     
    right: -10px;   
    background-color: #ff0000; 
    color: white;   
    font-size: 10px;
    font-weight: bold;
    width: 15px;    
    height: 15px;   
    border-radius: 50%; 
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    border: 2px solid white; 
    z-index: 10;
}
    .cart-popup {
    position: fixed;
    top: 75px;
    left: 20px; 
    width: 300px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    border-radius: 8px;
    z-index: 1000;
    padding: 15px;
    transition: 0.3s ease;
}

.cart-popup.hidden {
    display: none;
}

.product-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.product-info img {
    width: 60px;
    height: 60px;
    padding: 5px;
    object-fit: cover;
    border-radius: 5px;
}

.popup-footer button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.btn-checkout { background-color: #e31e24; color: white; }
.close-popup { cursor: pointer; float: right; font-size: 20px; }
  </style>
  <div id="cart-popup" class="cart-popup hidden">
    <div class="popup-content">
        <span class="close-popup" onclick="closeCartPopup()">&times;</span>
        <div class="product-info">
            <img id="popup-img" src="" alt="">
            <div>
                <h4 id="popup-title"></h4>
                <p id="popup-price"></p>
            </div>
        </div>
        <hr>
        <div class="popup-footer">
            <button class="btn-view-cart">عرض السلة</button>
            <button class="btn-checkout">إتمام الطلب</button>
        </div>
    </div>
</div>




  <div id="header-placeholder"></div>

  <div class="magazine-1">
      <p>المتجر </p>  

    </div>

  <div id="store-grid" class="card-container1"></div>

  <script>
    //المتجر
    const store = [
    { title: "شهادة مدرب معتمد", date: "735 د.إ", img: "assets/store&memberships/0011.jpg", link: "assets/store&memberships/0011.jpg" },
    { title: " شهادة مركز معتمد", date: " 1,469 د.إ", img: "assets/store&memberships/0012.jpg", link: "assets/store&memberships/0012.jpg" },
];

function createCardHTML(item, btnText = "عرض المجلة") {
    
    const itemData = JSON.stringify(item).replace(/"/g, '&quot;');
    
    return `
    <div class="card1">
        <img src="${item.img}" alt="${item.title}"/>
        <div class="class-content1">
            <h3>${item.title}</h3>
            <p>${item.date}</p>
            <button onclick="addToCart(${itemData})" class="btn1 add-to-cart-btn">${btnText}</button>
        </div>
    </div>`;
}

//المتجر
const myGrid5 = document.getElementById('store-grid');
if (myGrid5) {
    store.forEach(str => { myGrid5.innerHTML += createCardHTML(str, "اضافة الى السلة "); });
}


let count = 0; 

function addToCart(item) {
   
    let itemData = item;
    if (typeof item === 'string') {
        itemData = JSON.parse(item);
    }

   
    count++;
    const cartBadge = document.getElementById('cart-count');
    if (cartBadge) {
        cartBadge.innerText = count;
    }

   
    const popup = document.getElementById('cart-popup');
    const popupTitle = document.getElementById('popup-title');
    const popupImg = document.getElementById('popup-img');
    const popupPrice = document.getElementById('popup-price');

    if (popup) {
        popupTitle.innerText = itemData.title;
        popupImg.src = itemData.img;
        popupPrice.innerText = itemData.date; 

        
        popup.classList.remove('hidden');

       
        setTimeout(() => {
            popup.classList.add('hidden');
        }, 3000);
    }
}

  </script>


   <div id="footer-placeholder"></div>
             

    <script src="js/script.js"></script>
  </body>
</html>
