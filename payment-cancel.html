<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم إلغاء الدفع</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .payment-result {
      max-width: 650px;
      margin: 80px auto;
      background: #fff;
      padding: 35px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      font-family: Tajawal, Arial, sans-serif;
    }

    .payment-result h1 {
      color: #e4293a;
      margin-bottom: 15px;
    }

    .payment-result p {
      font-size: 18px;
      line-height: 1.8;
    }

    .payment-actions {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .payment-actions a {
      display: inline-block;
      background: #235287;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .payment-actions a.secondary {
      background: #e4293a;
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="payment-result">
    <h1>تم إلغاء الدفع</h1>
    <p>لم يتم إتمام عملية الدفع.</p>
    <p>يمكنك الرجوع لإتمام الطلب مرة أخرى أو العودة للمتجر.</p>

    <div class="payment-actions">
      <a href="checkout.html">الرجوع لإتمام الطلب</a>
      <a href="store.html" class="secondary">العودة للمتجر</a>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/script.js"></script>
  <script src="js/auth-toggle.js"></script>
</body>
</html>
