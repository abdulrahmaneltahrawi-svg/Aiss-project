<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" type="image/webp" href="assets/icons/logo.webp" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>نبذة عن المعهد-المعهد العربي لعلوم السلامة</title>
    <!--تعريف للخط-->

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000, // سرعة الحركة (ملي ثانية)
    once: true,     // الحركة تشتغل مرة واحدة فقط وأنت نازل
  });
</script>
  </head>

  <body>
    <style>
        .profile-images-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px; /* المسافة بين الصور */
    padding: 20px;
    background-color: #f4f4f4; /* خلفية خفيفة لتمييز الصور */
}

.profile-section {
    width: 100%;
    max-width: 900px; /* العرض الأقصى للصور لضمان الجودة */
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border-radius: 10px;
    overflow: hidden;
}

.profile-section img {
    width: 100%;
    height: auto;
    display: block;
}

/* تحسين العرض على الجوال */
@media (max-width: 768px) {
    .profile-section {
        max-width: 100%;
    }
}
    </style>

        <div id="header-placeholder"></div>

      <!--قسم صفحة العرض-->

  <div class="hero-section-m">
    <img src="assets/imge/banar.jpg" alt="store-pic" loading="lazy" />

      <p>خدمات المعهد العربي</p>
    </div>
  </div>

  <div class="title0">
    <p>الخدمات</p>
  </div>

<div class="profile-images-container">


    <div class="profile-section" data-aos="fade-up">
        <img src="assets/Brief/بروفايل-١٢.jpg" alt="الخدمات">
    </div>

        <div class="profile-section" data-aos="fade-up">
        <img src="assets/Brief/بروفايل-١٤.jpg" alt="المؤتمارات">
    </div>

    <div class="profile-section" data-aos="fade-right">
        <img src="assets/Brief/بروفايل-١٥.jpg" alt="الدرجات العملية ">

    <div class="profile-section" data-aos="fade-left">
        <img src="assets/Brief/بروفايل-١٦.jpg" alt="خدمه">

</div>
