<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icons/logo.webp" />
    <title>عرض - المعهد العربي لعلوم السلامة</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* منع التمرير في الصفحة بالكامل */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .flip-top {
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 5px;
        background: #fff;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        width: 95%;
        max-width: 900px;
        margin: 10px auto 0;
        border-radius: 16px 16px 0 0;
        flex-shrink: 0;
      }

      .flip-top h1 {
        font-size: 18px;
        color: black;
        font-weight: 900;
        white-space: nowrap;
      }

      .flip-top a {
        display: inline-block;
        padding: 8px 10px;
        border-radius: 10px;
        background: #e4293a;
        color: black;
        font-weight: bold;
        text-decoration: none;
      }

      #download-pdf {
        background: #235287;
        color: white;
        font-size: 14px;
        padding: 10px 15px;
        display: inline-block;
        /* يظهر فقط عند تحميل الرابط */
        white-space: nowrap;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(35, 82, 135, 0.3);
      }

      /* جعل الحاوية الرئيسية تأخذ كامل الارتفاع المتاح */
      .page-content {
        margin-top: 0 !important;
        padding-bottom: 0 !important;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ضبط حاوية الـ PDF لتملأ باقي المساحة */
      .pdf-viewer-container {
        flex-grow: 1;
        width: 95%;
        max-width: 900px;
        margin: 0 auto 10px !important;
        height: auto !important;
        border-radius: 0 0 16px 16px;
      }
    </style>
  </head>

  <body>
    <main class="page-content">
      <div class="flip-top">
        <h1 id="flip-title">جاري تحميل المجلة...</h1>
        <div style="display: flex; gap: 15px; align-items: center">
          <a id="download-pdf" href="#" target="_blank">فتح الملف كامل</a>
          <a id="flip-back" href="magazine.html">رجوع</a>
        </div>
      </div>

      <div
        class="pdf-viewer-container"
        style="margin-top: 0; border-radius: 0 0 16px 16px"
      >
        <iframe
          id="pdf-frame"
          src=""
          width="100%"
          height="100%"
          style="border: none"
        ></iframe>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") ? params.get("id").split("-")[0] : null;
      const source = params.get("source");

      // 1. تحديد رابط الرجوع فوراً قبل حذف الـ source من العنوان
      let defaultBack = source === "manuals" ? "manuals.html" : "magazine.html";
      let back = params.get("back") || defaultBack;

      // 2. تحديث زر الرجوع في الصفحة
      const backBtn = document.getElementById("flip-back");
      if (backBtn) {
        backBtn.href = back;
      }
function loadPDF(url) {
  if (!url) return;

  // 1. تنظيف المسار والتأكد أنه يبدأ من جذر المشروع (Aiss-project)
  // إذا كان الرابط يبدأ بـ ./ نوزعه ليكون مساراً كاملاً من الجذر
  let cleanPath = url.startsWith('./') ? url.substring(2) : (url.startsWith('/') ? url.substring(1) : url);
  
  // 2. بناء الرابط الكامل للملف (بدءاً من جذر الهوست)
  // هذا سيمنع المكتبة من البحث داخل مجلد js/web/
  const fullPdfUrl = window.location.origin + "/Aiss-project/" + cleanPath;

  const iframe = document.getElementById("pdf-frame");
  if (iframe) {
    // 3. تمرير الرابط الكامل للمكتبة
    // تأكد أن المسار هنا يطابق مكان وجود viewer.html في جهازك (js/web/viewer.html)
    const viewerUrl = `js/web/viewer.html?file=${encodeURIComponent(fullPdfUrl)}`;
    
    iframe.src = viewerUrl;
  }

  // تحديث زر التحميل
  const downloadBtn = document.getElementById("download-pdf");
  if (downloadBtn) {
      downloadBtn.href = fullPdfUrl;
      downloadBtn.style.display = "inline-block";
  }
}

     
      // داخل صفحة flipbook.html في جزء السكريبت
      if (id && id !== "0") {
        let apiUrl =
          source === "manuals"
            ? `api/get_booklet.php?id=${id}`
            : `api/get_magazine.php?id=${id}`;

        fetch(apiUrl)
          .then((res) => res.json())
          .then((data) => {
            console.log("البيانات المستلمة:", data); // تأكد من رؤية البيانات في F12

            if (data.success) {
              // تعديل هام: جلب البيانات من مفتاح booklet أو magazine
              const item = data.booklet || data.magazine;

              if (item) {
                document.getElementById("flip-title").textContent = item.title;

                // التأكد من جلب رابط الملف الصحيح (تأكد أن الاسم file_path مطابق لقاعدة البيانات)
                const pdfUrl = item.file_path || item.link;

                if (pdfUrl) {
                  loadPDF(pdfUrl); // تشغيل الدالة لعرض الملف
                } else {
                  console.error("رابط الملف غير موجود في البيانات المستلمة");
                }
              }
            } else {
              document.getElementById("flip-title").textContent =
                "المحتوى غير موجود";
            }
          })
          .catch((err) => console.error("خطأ في الاتصال بالسيرفر:", err));
      }

      // كود لتنظيف الرابط بعد التحميل
      window.onload = function () {
        setTimeout(() => {
          const url = new URL(window.location);
          if (url.searchParams.has("source")) {
            url.searchParams.delete("source");
            window.history.replaceState(
              {},
              document.title,
              url.pathname + url.search,
            );
          }
        }, 1000);
      };
    </script>
    <script src="js/script.js" defer></script>
    <script src="js/auth-toggle.js" defer></script>
  </body>
</html>
