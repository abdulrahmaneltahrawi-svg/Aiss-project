<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/icons/logo.webp" />
  <title>عرض - المعهد العربي لعلوم السلامة</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
.flip-wrap {
      width: min(1200px, 98%);
      /* تكبير الحاوية لتستوعب عرض الصفحتين */
      height: 150vh;
      /* تحديد طول ثابت للحاوية */
      margin: 60px auto 30px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
  
    }

    .flip-top {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .flip-top h1 {
      font-size: 16px;
      color: #111;
      font-weight: 900;
    }

    .flip-top a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(228, 41, 58, 0.12);
      color: #e4293a;
      font-weight: 900;
    }

    /* تعديل حاوية الجسم لمنع التمدد */
    /* الحاوية التي تحتوي على كلمة book */
   #book {
  display: none;
  margin: 0 auto;
  position: relative !important;
  /* إضافة انتقال ناعم لمنع القفز المفاجئ */
  transition: transform 0.5s ease-in-out; 
}

    /* الحاوية الأكبر (البوكس الأبيض الداخلي) */
   #flip-body {
  display: flex !important;
  justify-content: center !important;
  align-items: center !important;
  flex: 1;
  width: 100%;
  height: 100%; /* تأكد من شغل كامل الارتفاع */
  overflow: hidden;
  position: relative;
  background-color: #f0f0f0; /* اختياري: لون خلفية خفيف لتمييز الحواف */
}

    .page {
      background-color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      
    }

    .page canvas {
    width: 100% !important;
    height: 100% !important;
    /* fill سيقوم بمط محتوى صفحة الـ PDF لتملأ الطول الجديد */
    object-fit: fill !important;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* تغطية الحاوية بالكامل */
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease;
      /* إضافة تأثير تلاشي */
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(228, 41, 58, 0.7);
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 50;
      font-size: 20px;
      display: none; /* تظهر بعد التحميل */
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .nav-btn:hover { background: #b71c1c; }
    .nav-btn.prev { right: 30px; }
    .nav-btn.next { left: 30px; }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #e4293a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    #load-status {
      font-weight: 900;
      color: #e4293a;
      font-size: 22px;
      margin: 10px 0;
    }

    #load-progress {
      font-size: 13px;
      color: #777;
      margin-top: 5px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .flip-wrap {
      width: min(500px, 98%);
      height: 70vh;

    }

      .flip-top {
        flex-direction: row;
        align-items: stretch;
      }

      .flip-top h1 {
      margin-top: 12px;
    }

       #book {
  display: none;
  margin: 0 auto;
  position: relative !important;
  /* إضافة انتقال ناعم لمنع القفز المفاجئ */
  transition: transform 0.5s ease-in-out; 
  
}


      #flip-body {
  display: flex !important;
  justify-content: center !important;
  align-items: center !important;
  width: 100%;
  height: 100%; /* تأكد من شغل كامل الارتفاع */
}
    .page canvas {
      max-width: 900px;
      max-height: 900px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    }

      /* تنسيق وضع ملء الشاشة للتكبير */
     /* تنسيق وضع ملئ الشاشة */
.flip-wrap:fullscreen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* توسيط عمودي */
    align-items: center;    /* توسيط أفقي */
    background-color: white;     
}

.flip-wrap:fullscreen #flip-body {
    max-width: 1000px;      /* منع التضخم الزائد */
}
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="page-content">
    
    <div class="flip-wrap">
      
      <div class="flip-top">
        
        <h1 id="flip-title">  اسم المجلة المرسول</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
          <button id="fullscreen-btn" style="background: #e4293a; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: inherit;">ملء الشاشة</button>
          <a id="flip-back" href="magazine.html">رجوع</a>
        </div>
      </div>
      <div id="flip-body">
        <div id="loading-screen" style="display: flex;">
          <div class="loader"></div>
          <p id="load-status">جاري التحميل...</p>
          <div id="load-progress">يرجى الانتظار، يتم تحضير الكتاب...</div>
        </div>
        <button id="prev-page" class="nav-btn prev" title="الصفحة التالية">❮</button>
        <button id="next-page" class="nav-btn next" title="الصفحة السابقة">❯</button>
        <div id="book"></div>
      </div>
      <div class="flip-bottom" style="padding: 10px; text-align: center; margin-bottom: 40px;">
        <span id="page-num" style="font-size: 20px; font-weight: bold; color: #666; direction: ltr;">0 / 0</span>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    // إعدادات مكتبة PDF.js
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    // تأكد من استخدام الرابط الصحيح للـ Worker لضمان العمل على السيرفر المحلي
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pageFlipInstance;

    // 1. جلب المعرف والبيانات من الرابط و الـ API
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const src = params.get("src");
    const title = params.get("title");
    const back = params.get("back") || "magazine.html";

    if (back) document.getElementById("flip-back").href = back;
    if (title) document.getElementById("flip-title").textContent = title;

    if (id && id !== "0") {
        fetch(`api/get_magazine.php?id=${id}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const mag = data.magazine;
                    document.getElementById("flip-title").textContent = mag.title;
                    // البدء في معالجة الملف
                    loadAndRenderPDF(mag.file_path); 
                } else {
                    document.getElementById("load-status").textContent = "المجلة غير موجودة";
                    document.querySelector('.loader').style.display = 'none';
                }
            })
            .catch(err => {
                console.error("Fetch error:", err);
                document.getElementById("load-status").textContent = "فشل في الاتصال بالسيرفر";
            });
    } else if (src) {
        // دعم الروابط المباشرة (مثل الكتيبات والأرشيف القديم)
        loadAndRenderPDF(src);
    } else {
        document.getElementById("load-status").textContent = "لم يتم تحديد ملف للعرض";
        document.querySelector('.loader').style.display = 'none';
    }

    // 2. دالة معالجة الـ PDF وتحويله إلى صفحات متقلبة
   async function loadAndRenderPDF(pdfPath) {
    if (pageFlipInstance) {
        pageFlipInstance.destroy();
        pageFlipInstance = null;
    }
    const bookContainer = document.getElementById('book');
    bookContainer.innerHTML = '';

    try {
        const loadingTask = pdfjsLib.getDocument(pdfPath);
        const pdf = await loadingTask.promise;
        const totalPages = pdf.numPages;
        
        // --- المرحلة 1: تحميل أول 6 صفحات فقط للتشغيل السريع ---
        const initialLoadCount = Math.min(6, totalPages); 
        
        for (let i = 1; i <= initialLoadCount; i++) {
            await renderSinglePage(pdf, i, bookContainer);
        }

        // تشغيل الكتاب فوراً بعد أول 6 صفحات
        const firstPage = await pdf.getPage(1);
        const viewport = firstPage.getViewport({ scale: 1.2 });
        initPageFlip(totalPages, viewport.width, viewport.height);

        // إخفاء شاشة التحميل لأن الكتاب أصبح جاهزاً للتصفح
        document.getElementById('loading-screen').style.display = 'none';
        bookContainer.style.display = 'block';

        // --- المرحلة 2: تحميل باقي الصفحات في الخلفية ---
        if (totalPages > initialLoadCount) {
            for (let i = initialLoadCount + 1; i <= totalPages; i++) {
                // هنا لا نستخدم await الخارجي حتى لا نعطل المتصفح
                renderSinglePage(pdf, i, bookContainer).then(() => {
                    // تحديث المكتبة لتعرف أن هناك صفحة جديدة أضيفت
                    pageFlipInstance.updateFromHtml(document.querySelectorAll('.page'));
                });
            }
        }

    } catch (error) {
        console.error("Error:", error);
    }
}

// دالة مساعدة لرسم صفحة واحدة (عشان ما نكرر الكود)
async function renderSinglePage(pdf, i, container) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.9 });

    
    
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    pageDiv.style.width = viewport.width + 'px';
    pageDiv.style.height = viewport.height + 'px';

    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({ canvasContext: context, viewport: viewport }).promise;
    pageDiv.appendChild(canvas);
    container.appendChild(pageDiv);
}

    // 4. دالة إعداد تأثير تقليب الصفحات
function initPageFlip(totalPages, pageWidth, pageHeight) {
    const bookContainer = document.getElementById('book');
    const isMobile = window.innerWidth <= 768;

    pageFlipInstance = new St.PageFlip(bookContainer, {
        width: pageWidth,
        height: pageHeight,
        
        size: "stretch",
        mode: isMobile ? "portrait" : "double", // ابقِ على الـ double للكمبيوتر
        showCover: true,
        drawShadow: true,
        flippingTime: 1000,
        useMouseEvents: true,
        clickEventForward: false,
        startPage: 0
        
          });

    pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));

    // دالة للتحكم في التمركز (إزاحة الكتاب)
    const adjustPosition = (pageIndex) => {
    if (!isMobile) {
        if (pageIndex === 0) {
            // توسيط الغلاف (نزيحه بمقدار ربع عرض الحاوية الكلية)
            // استخدم نسبة 25% بدقة لضمان بقائه في المنتصف تماماً
            bookContainer.style.transform = `translateX(-25%)`;
        } else if (pageIndex === totalPages - 1 && totalPages % 2 === 0) {
            // توسيط الصفحة الأخيرة
            bookContainer.style.transform = `translateX(25%)`;
        } else {
            // عند فتح صفحتين (Double)، نلغي الإزاحة تماماً
            // هنا يظهر الحجم الحقيقي للصفحتين معاً
            bookContainer.style.transform = `translateX(0)`;
        }
    }
};

    pageFlipInstance.on('flip', (e) => {
        document.getElementById('page-num').textContent = `${e.data + 1} / ${totalPages}`;
        adjustPosition(e.data); // تحديث الموقع عند كل قلبة
    });

    // ربط الأزرار (المنطق العربي الصحيح)
    document.getElementById('prev-page').onclick = () => { pageFlipInstance.flipNext(); };
    document.getElementById('next-page').onclick = () => { pageFlipInstance.flipPrev(); };

    // إظهار الكتاب
    document.getElementById('loading-screen').style.display = 'none';
    bookContainer.style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.style.display = 'flex');
    
    setTimeout(() => { pageFlipInstance.update(); }, 200);
}

    // زر ملء الشاشة
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
        const wrap = document.querySelector('.flip-wrap');
        if (!document.fullscreenElement) {
            wrap.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    });
</script>
      <script src="js/m&m.js"></script>
      <script src="js/script.js"></script>
    <script src="js/auth-toggle.js"></script>
</body>

</html>
