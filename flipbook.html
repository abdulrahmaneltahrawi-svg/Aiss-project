<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/icons/logo.webp" />
  <title>عرض - المعهد العربي لعلوم السلامة</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    .flip-wrap {
      width: min(1000px, 98%);
      /* تكبير الحاوية لتستوعب عرض الصفحتين */
      height: 88vh;
      /* تحديد طول ثابت للحاوية */
      margin: 60px auto 30px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
    }

    .flip-top {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .flip-top h1 {
      font-size: 16px;
      color: #111;
      font-weight: 900;
    }

    .flip-top a {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(228, 41, 58, 0.12);
      color: #e4293a;
      font-weight: 900;
    }

    /* تعديل حاوية الجسم لمنع التمدد */
    /* الحاوية التي تحتوي على كلمة book */
    #book {
      display: none;
      margin: 0 auto;
      position: relative !important;
    }

    /* الحاوية الأكبر (البوكس الأبيض الداخلي) */
    #flip-body {
      display: flex !important;
      justify-content: center !important;
      /* توسيط المحتوى أفقياً */
      align-items: center !important;
      /* توسيط المحتوى عمودياً */
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* لمنع النزول لأسفل */
      position: relative;
    }

    .page {
      background-color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* تغطية الحاوية بالكامل */
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease;
      /* إضافة تأثير تلاشي */
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #e4293a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    #load-status {
      font-weight: 900;
      color: #e4293a;
      font-size: 22px;
      margin: 10px 0;
    }

    #load-progress {
      font-size: 13px;
      color: #777;
      margin-top: 5px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .flip-wrap {
        margin-top: 140px;
      }

      .flip-top {
        flex-direction: column;
        align-items: stretch;
      }

      #flip-body {
        padding: 10px 5px;
      }
    }

      /* تنسيق وضع ملء الشاشة للتكبير */
      .flip-wrap:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        margin: 0;
        border-radius: 0;
      }
      .flip-wrap:fullscreen #flip-body {
        flex: 1;
      }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="page-content">
    <div class="flip-wrap">
      <div class="flip-top">
        <h1 id="flip-title">عرض</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
          <span id="page-num" style="font-size: 14px; font-weight: bold; color: #666; direction: ltr;">0 / 0</span>
          <button id="fullscreen-btn" style="background: #e4293a; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: inherit;">ملء الشاشة</button>
          <a id="flip-back" href="magazine.html">رجوع</a>
        </div>
      </div>
      <div id="flip-body">
        <div id="loading-screen" style="display: flex;">
          <div class="loader"></div>
          <p id="load-status">جاري التحميل...</p>
          <div id="load-progress">يرجى الانتظار، يتم تحضير الكتاب...</div>
        </div>
        <div id="book"></div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pageFlipInstance; // تعريف المتغير في النطاق العام للوصول إليه عند التكبير

    async function startFlipbook() {
      // تسجيل وقت البداية لضمان بقاء الشاشة لفترة كافية
      const startTime = Date.now();
      const params = new URLSearchParams(window.location.search);
      const src = params.get('src');
      const title = params.get('title');
      const back = params.get('back') || 'magazine.html';

      // التأكد من ظهور شاشة التحميل
      document.getElementById('loading-screen').style.display = 'flex';

      if (title) document.getElementById('flip-title').textContent = title;
      document.getElementById('flip-back').href = back;

      if (!src) {
        document.getElementById('loading-screen').innerHTML = "<p>لم يتم العثور على رابط لملف PDF للعرض.</p>";
        console.error("PDF loading error: No 'src' parameter provided in URL.");
        return;
      }

      console.log("Attempting to load PDF from:", src); // سجل الرابط الذي يتم محاولة تحميله
      if (src.includes('publuu.com')) {
        const iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.style.width = "100%";
        iframe.style.height = "100%"; /* ملء الحاوية بالكامل */
        iframe.frameBorder = "0";
        iframe.allowFullscreen = true;
        iframe.onload = () => {
          const elapsed = Date.now() - startTime;
          const delay = Math.max(1000, 3000 - elapsed);
          setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
              document.getElementById('loading-screen').style.display = 'none';
            }, 500);
          }, delay);
        };
        document.getElementById('flip-body').appendChild(iframe);
        return;
      }

      try {
        // إضافة خيارات لتعطيل التحميل الجزئي (Range) لتجنب أخطاء 403 و CORS مع بعض خوادم الـ CDN
        const loadingTask = pdfjsLib.getDocument({
          url: src,
          disableRange: true,
          disableStream: true
        });
        const pdf = await loadingTask.promise;
        const book = document.getElementById('book');
        const totalPages = pdf.numPages;
        document.getElementById('page-num').textContent = `1 / ${totalPages}`;

        for (let i = 1; i <= totalPages; i++) {
          // تحديث نص التحميل
          document.getElementById('load-progress').textContent = `جاري معالجة الصفحة ${i} من ${totalPages}`;

          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.8 });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({ canvasContext: context, viewport: viewport }).promise;

          const pageDiv = document.createElement('div');
          pageDiv.className = 'page';
          pageDiv.appendChild(canvas);
          book.appendChild(pageDiv);
        }

        // تحديد ما إذا كان الجهاز جوال أم لابتوب بناءً على عرض الشاشة
        const isMobile = window.innerWidth <= 768;
        pageFlipInstance = new St.PageFlip(book, {
          width: isMobile ? 400 : 1000, // 400 للجوال و 900 للابتوب
          height: 500,
          showCover: true,      // إظهار الغلاف منفرد
          drawShadow: true,
          flippingTime: 800,
          startPage: 0,
          autoSize: false,
          usePortrait: true,
          mobileScrollSupport: false,
          clickEventForward: true,
          swipeDistance: 30,
          showPageCorners: true,
          disableFlipByClick: false
        });
        pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));

        pageFlipInstance.on('flip', (e) => {
          document.getElementById('page-num').textContent = `${e.data + 1} / ${totalPages}`;
        });

        // ننتظر حتى يكتمل بناء المجلة تماماً وتثبيتها في المتصفح
        const elapsed = Date.now() - startTime;
        const delay = Math.max(1000, 3000 - elapsed); // ضمان بقاء الشاشة لمدة 3 ثوانٍ على الأقل

        setTimeout(() => {
          book.style.display = 'block'; // إظهار الكتاب فقط بعد اكتمال معالجة كافة الصفحات
          if (pageFlipInstance) pageFlipInstance.update();
          document.getElementById('loading-screen').style.opacity = '0';
          setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
          }, 500);
        }, delay);

      // منطق زر ملء الشاشة (التكبير)
      const fsBtn = document.getElementById('fullscreen-btn');
      const flipWrap = document.querySelector('.flip-wrap');

      fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          flipWrap.requestFullscreen().catch(err => {
            console.error(`Error: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? 'خروج' : 'ملء الشاشة';
        // تحديث مقاسات المجلة لضمان استجابتها للمقاس الجديد
        if(pageFlipInstance) pageFlipInstance.update();
      });

      } catch (err) {
        console.error("Error loading PDF:", err);
        document.getElementById('loading-screen').innerHTML = `<p>عذراً، حدث خطأ أثناء تحميل الملف: <br> <strong>${err.message || err}</strong></p><p>يرجى التأكد من أن الرابط صحيح وأن الملف موجود.</p><p>الرابط الذي حاولنا تحميله: <br><code>${src}</code></p>`;
      }
    }
    window.addEventListener('DOMContentLoaded', startFlipbook);
  </script>
  <script src="js/script.js"></script>
</body>

</html>
